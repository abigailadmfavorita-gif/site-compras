<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Programação de Lançamentos Favorita</title>
  <link rel="icon" type="image/png" href="favicon-favorita.png" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f6f3ef;
      color: #1f1f1f;
    }

    .container {
      width: min(1320px, 95%);
      margin: 0 auto;
      padding: 30px 0 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
    }

    #meta {
      font-size: 14px;
      color: #6f675f;
      padding-top: 6px;
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    select,
    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #d7cec2;
      background: #fff;
      font-size: 14px;
      color: #1f1f1f;
      outline: none;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .card {
      background: #fff;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #ebe2d8;
    }

    .card-title {
      font-size: 12px;
      text-transform: uppercase;
      color: #8a7c6d;
      margin-bottom: 8px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .card-value {
      font-size: 16px;
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
    }

    .product {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 1px solid #ebe2d8;
    }

    .image-box {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #f0ebe4;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .image-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .no-image {
      color: #8a7c6d;
      font-size: 14px;
    }

    .info {
      padding: 14px;
      font-size: 13px;
      line-height: 1.5;
    }

    .product-name {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .meta-line {
      margin-bottom: 4px;
    }

    .meta-line strong {
      font-weight: 700;
    }

    .status-pill {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: #f0ebe4;
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #5f554a;
    }

    .empty-state {
      grid-column: 1 / -1;
      background: #fff;
      border: 1px solid #ebe2d8;
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      color: #6f675f;
    }

    @media (max-width: 1200px) {
      .grid {
        grid-template-columns: repeat(3, 1fr);
      }

      .summary,
      .filters {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 900px) {
      .filters,
      .summary {
        grid-template-columns: repeat(2, 1fr);
      }

      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 560px) {
      .topbar {
        flex-direction: column;
      }

      .filters,
      .summary,
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <h1>Programação de Lançamentos Favorita</h1>
      <span id="meta">Carregando...</span>
    </div>

    <div class="filters">
      <select id="pais">
        <option value="brasil">Brasil</option>
        <option value="paraguay">Paraguay</option>
        <option value="uruguay">Uruguay</option>
        <option value="chile">Chile</option>
      </select>

      <select id="edicao">
        <option value="">Todas Edições</option>
      </select>

      <select id="caderno">
        <option value="">Todos Cadernos</option>
      </select>

      <select id="categoria">
        <option value="">Todas Categorias</option>
      </select>

      <input id="busca" placeholder="Buscar produto, referência ou SKU..." />
    </div>

    <div class="summary">
      <div class="card">
        <div class="card-title">Itens</div>
        <div class="card-value" id="itens">0</div>
      </div>

      <div class="card">
        <div class="card-title">Edições</div>
        <div class="card-value" id="eds">0</div>
      </div>

      <div class="card">
        <div class="card-title">PDV Local Médio</div>
        <div class="card-value" id="pdvLocal">0</div>
      </div>

      <div class="card">
        <div class="card-title">PDV R$ Médio</div>
        <div class="card-value" id="pdvBRL">R$ 0,00</div>
      </div>

      <div class="card">
        <div class="card-title">Margem Média</div>
        <div class="card-value" id="margemMedia">0,0%</div>
      </div>
    </div>

    <div id="app" class="grid"></div>
  </div>

  <script>
const API = "https://script.google.com/macros/s/AKfycbwyh88du3DSQXCEo-T5dAuEtVqLB13lkyjzyGm6Bj4_zNh7FGXf6xbnBIZBg6ILFKTA/exec";
    let data = [];

    function get(row, keys) {
      for (const key of keys) {
        if (row[key] !== undefined && row[key] !== null && row[key] !== "") {
          return row[key];
        }
      }
      return "";
    }

    function num(v) {
      if (v === null || v === undefined || v === "") return 0;

      const raw = String(v)
        .trim()
        .replace("R$", "")
        .replace("$", "")
        .replace(/\s/g, "");

      let n;

      if (raw.includes(",") && raw.includes(".")) {
        n = Number(raw.replace(/\./g, "").replace(",", "."));
      } else if (raw.includes(",")) {
        n = Number(raw.replace(",", "."));
      } else {
        n = Number(raw);
      }

      return isNaN(n) ? 0 : n;
    }

    function formatMoneyBRL(v) {
      return v.toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL"
      });
    }

    function formatLocal(v) {
      return v.toLocaleString("es-CL");
    }

    function formatPercent(v) {
      return (v * 100).toLocaleString("pt-BR", {
        minimumFractionDigits: 1,
        maximumFractionDigits: 1
      }) + "%";
    }

    function getPais(row) {
      return get(row, ["País", "Pais", "PAÍS", "pais"]);
    }

    function getRef(row) {
      return get(row, ["Referência", "REFERÊNCIA", "REFERENCIA", "referencia"]) || "-";
    }

    function getFoto(row) {
      return get(row, ["FOTO", "Foto", "foto"]);
    }

    function getStatus(row) {
      return get(row, ["STATUS", "Status", "status"]) || "-";
    }

    function getSku(row) {
      return get(row, ["SKU", "Sku", "sku"]);
    }

    function getEdicao(row) {
      return get(row, ["Edição", "EDIÇÃO", "Edicao", "edicao"]);
    }

    function getCaderno(row) {
      return get(row, ["Caderno", "caderno"]);
    }

    function getCategoria(row) {
      return get(row, ["Categoria", "categoria"]);
    }

    function getProduto(row) {
      return get(row, ["Produto", "produto"]) || "-";
    }

    function getCusto(row) {
      return num(get(row, ["Custo", "custo"]));
    }

    function getPDVLocalBruto(row) {
      return get(row, ["PDV Local", "PDV LOCAL", "Pdv Local"]);
    }

    function getPDVLocal(row) {
      return num(getPDVLocalBruto(row));
    }

    function getPDVBRL(row) {
      return num(get(row, ["PDV R$", "PDV_RS", "Pdv R$"]));
    }

    function getMargem(row) {
      const custo = getCusto(row);
      const pdv = getPDVBRL(row);

      if (!custo || !pdv || pdv <= 0) return 0;
      return (pdv - custo) / pdv;
    }

    function uniqueSorted(values) {
      return [...new Set(values.filter(Boolean))].sort((a, b) =>
        String(a).localeCompare(String(b), "pt-BR", { numeric: true })
      );
    }

    function carregar(d) {
      if (d && d.error) {
        document.getElementById("meta").innerText = "Erro ao carregar";
        document.getElementById("app").innerHTML =
          `<div class="empty-state">${d.message || "Erro na API"}</div>`;
        return;
      }

      data = Array.isArray(d) ? d : [];
      montarFiltros();
      render();
    }

    function montarFiltros() {
      const paisSelect = document.getElementById("pais");
      const edicaoSelect = document.getElementById("edicao");
      const cadernoSelect = document.getElementById("caderno");
      const categoriaSelect = document.getElementById("categoria");

      const edicaoAtual = edicaoSelect.value;
      const cadernoAtual = cadernoSelect.value;
      const categoriaAtual = categoriaSelect.value;

      const paisAtual = paisSelect.value;
      if (paisAtual) {
        paisSelect.value = paisAtual;
      }

      const edicoes = uniqueSorted(data.map(r => getEdicao(r)));
      const cadernos = uniqueSorted(data.map(r => getCaderno(r)));
      const categorias = uniqueSorted(data.map(r => getCategoria(r)));

      edicaoSelect.innerHTML = '<option value="">Todas Edições</option>';
      cadernoSelect.innerHTML = '<option value="">Todos Cadernos</option>';
      categoriaSelect.innerHTML = '<option value="">Todas Categorias</option>';

      edicoes.forEach(v => edicaoSelect.add(new Option(v, v)));
      cadernos.forEach(v => cadernoSelect.add(new Option(v, v)));
      categorias.forEach(v => categoriaSelect.add(new Option(v, v)));

      if (edicoes.includes(edicaoAtual)) edicaoSelect.value = edicaoAtual;
      if (cadernos.includes(cadernoAtual)) cadernoSelect.value = cadernoAtual;
      if (categorias.includes(categoriaAtual)) categoriaSelect.value = categoriaAtual;
    }

    function filtrar() {
      const pais = document.getElementById("pais").value;
      const ed = document.getElementById("edicao").value;
      const cad = document.getElementById("caderno").value;
      const cat = document.getElementById("categoria").value;
      const b = document.getElementById("busca").value.toLowerCase().trim();

      return data.filter(r => {
        const paisPlanilha = getPais(r);
        const paisOk = !pais || !paisPlanilha || String(paisPlanilha).toLowerCase() === pais.toLowerCase();
        const edOk = !ed || getEdicao(r) === ed;
        const cadOk = !cad || getCaderno(r) === cad;
        const catOk = !cat || getCategoria(r) === cat;

        const buscaOk =
          !b ||
          String(getProduto(r)).toLowerCase().includes(b) ||
          String(getRef(r)).toLowerCase().includes(b) ||
          String(getSku(r)).toLowerCase().includes(b);

        return paisOk && edOk && cadOk && catOk && buscaOk;
      });
    }

    function render() {
      const list = filtrar();

      document.getElementById("meta").innerText = list.length + " itens";
      document.getElementById("itens").innerText = list.length;
      document.getElementById("eds").innerText =
        [...new Set(list.map(x => getEdicao(x)).filter(Boolean))].length;

      const pdvLocal = list.map(x => getPDVLocal(x)).filter(v => v > 0);
      const pdvBRL = list.map(x => getPDVBRL(x)).filter(v => v > 0);
      const margens = list.map(x => getMargem(x)).filter(v => v > 0);

      const pdvLocalMed = pdvLocal.length
        ? pdvLocal.reduce((a, b) => a + b, 0) / pdvLocal.length
        : 0;

      const pdvBRLMed = pdvBRL.length
        ? pdvBRL.reduce((a, b) => a + b, 0) / pdvBRL.length
        : 0;

      const margemMedia = margens.length
        ? margens.reduce((a, b) => a + b, 0) / margens.length
        : 0;

      document.getElementById("pdvLocal").innerText = pdvLocalMed ? formatLocal(pdvLocalMed) : "0";
      document.getElementById("pdvBRL").innerText = formatMoneyBRL(pdvBRLMed);
      document.getElementById("margemMedia").innerText = formatPercent(margemMedia);

      const app = document.getElementById("app");

      if (!list.length) {
        app.innerHTML = '<div class="empty-state">Nenhum produto encontrado com os filtros atuais.</div>';
        return;
      }

      app.innerHTML = list.map(p => `
        <div class="product">
          <div class="image-box">
            ${
              getFoto(p)
                ? `<img src="${getFoto(p)}" alt="${String(getProduto(p)).replace(/"/g, '&quot;')}">`
                : `<div class="no-image">Sem imagem</div>`
            }
          </div>

          <div class="info">
            <div class="product-name">${getProduto(p)}</div>
            <div class="status-pill">${getStatus(p)}</div>

            <div class="meta-line"><strong>Ref:</strong> ${getRef(p)}</div>
            <div class="meta-line"><strong>Custo:</strong> ${formatMoneyBRL(getCusto(p))}</div>
            <div class="meta-line"><strong>PDV Local:</strong> ${getPDVLocalBruto(p) || "-"}</div>
            <div class="meta-line"><strong>PDV R$:</strong> ${formatMoneyBRL(getPDVBRL(p))}</div>
            <div class="meta-line"><strong>Margem:</strong> ${formatPercent(getMargem(p))}</div>
          </div>
        </div>
      `).join("");
    }

    function load() {
      const old = document.getElementById("jsonp-script");
      if (old) old.remove();

      const pais = document.getElementById("pais").value || "brasil";

      const s = document.createElement("script");
      s.id = "jsonp-script";
      s.src = API + "?pais=" + encodeURIComponent(pais) + "&callback=carregar&t=" + Date.now();
      document.body.appendChild(s);
    }

    document.getElementById("pais").onchange = function () {
      document.getElementById("edicao").value = "";
      document.getElementById("caderno").value = "";
      document.getElementById("categoria").value = "";
      document.getElementById("busca").value = "";
      load();
    };

    document.getElementById("edicao").onchange = render;
    document.getElementById("caderno").onchange = render;
    document.getElementById("categoria").onchange = render;
    document.getElementById("busca").oninput = render;

    load();
    setInterval(load, 30000);
  </script>
</body>
</html>
